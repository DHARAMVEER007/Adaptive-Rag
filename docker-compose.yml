services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mock-auth:
    build: ./mock_auth
    ports:
      - "8090:8080"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB_NAME=adaptive_rag
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES:-1440}
    depends_on:
      mongodb:
        condition: service_healthy

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB_NAME=adaptive_rag
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    volumes:
      - fastembed_cache:/tmp/fastembed_cache
      - faiss_data:/app/data
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
      mock-auth:
        condition: service_started
    restart: unless-stopped

volumes:
  mongo_data:
  fastembed_cache:
  faiss_data:
